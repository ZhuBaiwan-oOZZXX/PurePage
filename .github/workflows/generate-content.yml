name: Generate Content

on:
  push:
    branches:
      - main

jobs:
  generate-content:
    # 排除 bot 自己的推送，避免无限循环
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write # 允许推送

    steps:
      # 1️⃣ 检出仓库
      - uses: actions/checkout@v6

      # 2️⃣ 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # 3️⃣ 运行生成脚本
      - name: Run generate-content.js
        run: node generate-content.js

      # 4️⃣ 提交并推送生成的文件
      - name: Commit and push changes
        run: |
          # 检查是否有文件变化
          if [ -z "$(git status --porcelain content-structure.json index.md)" ]; then
            echo "✅ 内容没有变化，无需提交"
            exit 0
          fi

          # 配置 Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 添加生成的文件
          git add content-structure.json index.md

          # 提交更新
          git commit -m "自动生成内容 ($(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S CST'))"

          # 推送到远程 main 分支
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
